<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>minesweeper</title>
<style>
    body {
    margin: 0;
    background: #111;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    width: 100vw;
    height: 100vh;
}
    canvas {
    background: black;
    touch-action: none;

    width: min(100vw, 100vh);
    height: min(100vw, 100vh);
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const WINDOW_WIDTH = 400;
const WINDOW_HEIGHT = 400;
const w = 20;
const h = 20;

/* ============================================================
   GLOBALS
   ============================================================ */
const canvas = document.getElementById("game");
canvas.width = WINDOW_WIDTH;
canvas.height = WINDOW_HEIGHT;

const ctx = canvas.getContext("2d");

let running = true;
let dir = "right";

/* ============================================================
   INPUT
   ============================================================ */
const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

/* ============================================================
   UNIVERSAL INPUT (Single handler for Mouse + Touch)
   ============================================================ */
function handleInput(e) {
    e.preventDefault();
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY; 
    } else {
        clientX = e.clientX;
        clientY = e.clientY;  
    }
    
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;  
    
    // Scale coordinates to match canvas size
    const scaleX = WINDOW_WIDTH / rect.width;
    const scaleY = WINDOW_HEIGHT / rect.height;
    const canvasX = x * scaleX;
    const canvasY = y * scaleY;
    if(menu===0){
        vel=10
    }
    else{
        menu=0
    }
    
}

canvas.addEventListener("touchstart", handleInput);
canvas.addEventListener("mousedown", handleInput);

/* ============================================================
   GAME STATE
   ============================================================ */
function reset(){
    px=60
    py=200
    vel= 0

    pipe1x=200
    pipe1y=200
    pipe2x=400
    pipe2y=200
    pipe1yu=pipe1y-100

    score=0
}
reset()
menu=1
let birdImg = new Image();
birdImg.src = 'assets/yellowbird-midflap.gif';
let bg = new Image();
bg.src = 'assets/background-day.gif';

let lp = new Image();
lp.src = 'assets/pipe-green.gif';
let up = new Image();
up.src = 'assets/pipe-green2.gif';

let mainmenu = new Image();
mainmenu.src = 'assets/mainmenu.gif';
/* ============================================================
   MAIN LOOP
   ============================================================ */
function game_loop() {
    if (!running) return;
        
        ctx.font = "15px Arial";
        if(menu===0){

            
            if(keys[" "]){
                vel=10
            }
            else{
                vel=vel-1
            }
            py=py-vel

            pipe1yu=pipe1y-100
            pipe1x=pipe1x-5
            if(pipe1x<=-w*2){
                pipe1x=400
                x=Math.floor(Math.random()*2)+1
                
                if(x===1){
                    pipe1y=200-(Math.floor(Math.random()*5))*20
                }
                if(x===2){
                    pipe1y=200+(Math.floor(Math.random()*5))*20
                }

                score=score+1
                console.log(score)
                
            }


            pipe2yu=pipe2y-100
            pipe2x=pipe2x-5
            if(pipe2x<=-w*2){
                pipe2x=400
                x=Math.floor(Math.random()*2)+1
                
                if(x===1){
                    pipe2y=200-(Math.floor(Math.random()*5))*20
                    
                }
                if(x===2){
                    pipe2y=200+(Math.floor(Math.random()*5))*20
                }
                score=score+1
                    console.log(score)
            }


            if(pipe1x <= px+w && px+w <= pipe1x+w*2 && ((py+h >= pipe1y)||(pipe1yu >= py))){
                reset()
            }
            else if(pipe1x <= px+w && px+w <= pipe1x+w*2){
                
            }
            
            if(pipe2x <= px+w && px+w <= pipe2x+w*2 && ((py+h >= pipe2y)||(pipe2yu >= py))){
                reset()
            }
            else if(pipe2x <= px+w && px+w <= pipe2x+w*2){
                
            }

            /* ===== RENDER ===== */
            //clear screen
            ctx.fillStyle="#000000"
            ctx.fillRect(0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)

            //bg
            ctx.drawImage(bg, 0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)


            //bird
            ctx.drawImage(birdImg, px, py, w, h)
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(px, py, w, h)

            //pipe 1
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe1x, pipe1y, w*2, WINDOW_HEIGHT)
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe1x, pipe1yu, w*2, -WINDOW_HEIGHT)
            ctx.drawImage(lp, pipe1x, pipe1y, w*2, WINDOW_HEIGHT)
            ctx.drawImage(up, pipe1x, pipe1yu, w*2, -WINDOW_HEIGHT)



            //pipe 2
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe2x, pipe2y, w*2, WINDOW_HEIGHT)
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe2x, pipe2yu, w*2, -WINDOW_HEIGHT)
            
            ctx.drawImage(lp, pipe2x, pipe2y, w*2, WINDOW_HEIGHT)
            ctx.drawImage(up, pipe2x, pipe2yu, w*2, -WINDOW_HEIGHT)
        }
        else if(menu===1){
            ctx.drawImage(mainmenu, 0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)
            if(keys[" "]){
                menu=0
            }
        }

    setTimeout(() => {
        requestAnimationFrame(game_loop);
    }, 50);
}

game_loop();
</script>
</body>
</html>
