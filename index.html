<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>flappy bird</title>
<style>
    body {
    margin: 0;
    background: #111;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    width: 100vw;
    height: 100vh;
}
    canvas {
    background: black;
    touch-action: none;

    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const WINDOW_WIDTH = 400;
const WINDOW_HEIGHT = 400;
const w = 40;
const h = 40;

/* ============================================================
   GLOBALS
   ============================================================ */
const canvas = document.getElementById("game");
canvas.width = WINDOW_WIDTH;
canvas.height = WINDOW_HEIGHT;

const ctx = canvas.getContext("2d");

let running = true;
let dir = "right";

/* ============================================================
   INPUT
   ============================================================ */
const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key] = false;
});

/* ============================================================
   UNIVERSAL INPUT (Single handler for Mouse + Touch)
   ============================================================ */
function handleInput(e) {
    e.preventDefault();
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY; 
    } else {
        clientX = e.clientX;
        clientY = e.clientY;  
    }
    
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;  
    
    // Scale coordinates to match canvas size
    const scaleX = WINDOW_WIDTH / rect.width;
    const scaleY = WINDOW_HEIGHT / rect.height;
    const canvasX = x * scaleX;
    const canvasY = y * scaleY;

    if(menu===0){
      if(canvasX <= 50 && canvasY <=30){
        menu=1
      }
      else{
        vel=10
        wing.currentTime=0
        if(sound ===1){wing.play()}
        
        
        
      }
        
    }
    else{
      if(canvasX <= 50 && canvasY <=30){
        if (sound===1){
            sound=0
        }
        else{
            sound=1
        }
        
      }
      else{
        menu=0
      }
        
    }
    
}

canvas.addEventListener("touchstart", handleInput);
canvas.addEventListener("mousedown", handleInput);

/* ============================================================
   GAME STATE
   ============================================================ */
function reset(){
    px=60
    py=200
    vel= 0

    pipe1x=200
    pipe1y=200
    pipe2x=400
    pipe2y=200
    pipe1yu=pipe1y-100

    score=0

    menu=1
}
menu=1
reset()

sound=1
bicon=1
let birdImg = new Image();
birdImg.src = 'yellowbird-midflap.gif';
let birdd = new Image();
birdd.src = 'yellowbird-downflap.gif';
let birdu = new Image();
birdu.src = 'yellowbird-upflap.gif';

let bg = new Image();
bg.src = 'background-day.gif';

let lp = new Image();
lp.src = 'pipe-green.gif';
let up = new Image();
up.src = 'pipe-green2.gif';

let mainmenu = new Image();
mainmenu.src = 'mainmenu.gif';

let point = new Audio('point.wav')
let wing = new Audio('wing.wav')
let hit = new Audio('hit.wav')
/* ============================================================
   MAIN LOOP
   ============================================================ */
function game_loop() {
    if (!running) return;
        
        ctx.font = "15px Arial";
        if(menu===0){
            if(keys["p"]){
                menu=1
            }
            
            if(keys[" "]){
                vel=10
                wing.currentTime=0
                if(sound ===1){wing.play()}
                
            }
            else{
                vel=vel-1
                
                
            }
            py=py-vel

            pipe1yu=pipe1y-150
            pipe1x=pipe1x-5
            if(pipe1x<=-w*2){
                pipe1x=400
                x=Math.floor(Math.random()*2)+1
                
                if(x===1){
                    pipe1y=200+(Math.floor(Math.random()*3))*w
                }
                if(x===2){
                    pipe1y=200+(Math.floor(Math.random()*4))*w
                }

                
                
            }


            pipe2yu=pipe2y-150
            pipe2x=pipe2x-5
            if(pipe2x<=-w*2){
                pipe2x=400
                x=Math.floor(Math.random()*2)+1
                
                if(x===1){
                    pipe2y=200+(Math.floor(Math.random()*3))*w
                    
                }
                if(x===2){
                    pipe2y=200+(Math.floor(Math.random()*4))*w
                }
                
            }
            if(pipe1x+w*2 === 60 || pipe2x+w*2 === 60 ){
              score=score+1
              point.currentTime=0
              if(sound ===1){point.play()}
            }

            if(pipe1x <= px+w && px+w <= pipe1x+w*2 && ((py+h >= pipe1y)||(pipe1yu >= py))){
                reset()
                hit.currentTime=0
                if(sound ===1){hit.play()}
            }
            else if(pipe1x <= px+w && px+w <= pipe1x+w*2){
                
            }
            
            if(pipe2x <= px+w && px+w <= pipe2x+w*2 && ((py+h >= pipe2y)||(pipe2yu >= py))){
                reset()
                hit.currentTime=0
                if(sound ===1){hit.play()}
            }
            else if(pipe2x <= px+w && px+w <= pipe2x+w*2){
                
            }

            /* ===== RENDER ===== */
            //clear screen
            ctx.fillStyle="#000000"
            ctx.fillRect(0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)

            //bg
            ctx.drawImage(bg, 0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)


            //bird
            if(vel <0){
              ctx.drawImage(birdd, px, py, w, h)
              bicon=1
            }else if(bicon<=5){

              ctx.drawImage(birdImg, px, py, w, h)
              bicon=bicon+1
            }else{
              ctx.drawImage(birdu, px, py, w, h)
            }
            
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(px, py, w, h)

            //pipe 1
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe1x, pipe1y, w*2, WINDOW_HEIGHT)
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe1x, pipe1yu, w*2, -WINDOW_HEIGHT)
            ctx.drawImage(lp, pipe1x, pipe1y, w*2, WINDOW_HEIGHT)
            ctx.drawImage(up, pipe1x, pipe1yu, w*2, -WINDOW_HEIGHT)



            //pipe 2
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe2x, pipe2y, w*2, WINDOW_HEIGHT)
            //ctx.fillStyle="#ff00ff"
            //ctx.fillRect(pipe2x, pipe2yu, w*2, -WINDOW_HEIGHT)
            
            ctx.drawImage(lp, pipe2x, pipe2y, w*2, WINDOW_HEIGHT)
            ctx.drawImage(up, pipe2x, pipe2yu, w*2, -WINDOW_HEIGHT)

            ctx.fillStyle="#ffffff"
            ctx.fillText(score, 180, 100)

            ctx.fillStyle="#000000"
            ctx.fillText("pause", 10, 10)
        }
        else if(menu===1){
            ctx.drawImage(mainmenu, 0, 0, WINDOW_WIDTH, WINDOW_HEIGHT)
            ctx.fillStyle="#000000"
            ctx.fillText("unpause", 10, 10)
            ctx.fillStyle="#000000"
            ctx.fillText("toggle sound", 10, 30)
            if(keys[" "]){
                menu=0
            }
            if(keys["p"]){
                menu=0
            }
        }

    setTimeout(() => {
        requestAnimationFrame(game_loop);
    }, 50);
}

game_loop();
</script>
</body>
</html>
